# ================================================================
#  FlowGuide - Spring Boot Configuration
# ================================================================

server.port=8080
spring.application.name=flowguide-spring

# ================================================================
# PostgreSQL - connects to localhost:5432/flowguide
# ================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/flowguide
spring.datasource.username=postgres
spring.datasource.password=Manu@2008
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=FlowGuideHikariPool

# ================================================================
# JPA / Hibernate -> AUTO TABLE CREATION
# update = creates tables if missing, adds new columns, never drops data
# ================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ================================================================
# Email / SMTP - placeholders, app starts fine without real creds
# Fill these in later when you're ready to send real emails
# ================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-16-char-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.from=noreply@flowguide.com

# ================================================================
# Scheduler thread pool
# ================================================================
spring.task.scheduling.pool.size=5
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10

# ================================================================
# Actuator
# ================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.app.name=FlowGuide Spring Boot
management.info.app.version=1.0.0

# ================================================================
# Logging
# ================================================================
logging.level.com.flowguide=DEBUG
logging.level.org.springframework.mail=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n